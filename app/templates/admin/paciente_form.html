{% extends "base.html" %}

{% block title %}Alta de Paciente{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white py-3">
                <h4 class="mb-0"><i class="bi bi-person-plus-fill"></i> Registro de Paciente</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('admin.nuevo_paciente') }}">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Nombre Completo *</label>
                            <input type="text" class="form-control" name="nombre_completo" required placeholder="Ej: Juan Pérez Gómez">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">DNI *</label>
                            <input type="text" class="form-control" name="dni" required placeholder="12345678A">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" name="email" placeholder="correo@ejemplo.com">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Tipo de Paciente *</label>
                            <select class="form-select" name="tipo" required>
                                <option value="publico">Público (Derivado)</option>
                                <option value="privado">Privado</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Cuenta Bancaria (Solo Privados)</label>
                            <input type="text" class="form-control" name="cuenta" placeholder="ES12 3456 7890...">
                            <div class="form-text">Obligatorio si el tipo es Privado.</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between border-top pt-3">
                        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-light">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">
                            <i class="bi bi-check-lg"></i> Confirmar Alta
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
