{% extends "base.html" %}

{% block title %}Cuestionario Diario - CEDIZA{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">

        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0">
                    <i class="bi bi-clipboard2-pulse"></i> Cuestionario Diario
                </h4>
                <small>Por favor, responde a estas preguntas para ayudarnos a hacer tu seguimiento.</small>
            </div>

            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('paciente.responder') }}" id="cuestionarioForm">

                    <!-- PREGUNTA 1: ¿Cómo te encuentras hoy? -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">1. ¿Cómo te encuentras hoy?</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="respuesta_1" value="Bien" required>
                                <label class="form-check-label">Bien</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="respuesta_1" value="Regular" required>
                                <label class="form-check-label">Regular</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="respuesta_1" value="Mal" required>
                                <label class="form-check-label">Mal</label>
                            </div>
                        </div>
                    </div>

                    <!-- PREGUNTA 2: ¿Cuántas horas has dormido? -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">2. ¿Cuántas horas has dormido?</label>
                        <select class="form-select" name="respuesta_2" required>
                            <option value="" disabled selected>Selecciona una opción</option>
                            <option value="Menos de 5 horas">Menos de 5 horas</option>
                            <option value="De 5 a 6 horas">De 5 a 6 horas</option>
                            <option value="De 6 a 7 horas">De 6 a 7 horas</option>
                            <option value="De 7 a 9 horas">De 7 a 9 horas</option>
                            <option value="Más de 9 horas">Más de 9 horas</option>
                        </select>
                    </div>

                    <!-- PREGUNTA 3: ¿Recuerdas qué hiciste ayer por la tarde? -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">3. ¿Recuerdas qué hiciste ayer por la tarde?</label>
                        <div class="mb-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="respuesta_3_si_no" value="Si" id="radioSi" required>
                                <label class="form-check-label" for="radioSi">Sí</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="respuesta_3_si_no" value="No" id="radioNo" required>
                                <label class="form-check-label" for="radioNo">No</label>
                            </div>
                        </div>
                        <div id="campoQueHiciste" style="display:none;">
                            <label class="form-label">¿Qué hiciste?</label>
                            <textarea class="form-control" name="respuesta_3" rows="2" placeholder="Describe lo que hiciste..."></textarea>
                        </div>
                    </div>

                    <!-- PREGUNTA 4: ¿Qué has desayunado hoy? -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">4. ¿Qué has desayunado hoy?</label>
                        <textarea class="form-control" name="respuesta_4" rows="2" placeholder="Ej: Café con leche y tostadas" required></textarea>
                    </div>

                    <div class="d-flex justify-content-between border-top pt-4">
                        <a href="{{ url_for('paciente.dashboard') }}" class="btn btn-outline-secondary btn-lg px-4">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary btn-lg px-4">
                            <i class="bi bi-send-check"></i> Enviar Respuestas
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<script>
// Mostrar/ocultar campo "¿Qué hiciste?" si selecciona "Sí"
const radioSi = document.getElementById('radioSi');
const radioNo = document.getElementById('radioNo');
const campoQueHiciste = document.getElementById('campoQueHiciste');

function toggleCampoQueHiciste() {
    if (radioSi.checked) {
        campoQueHiciste.style.display = 'block';
        document.querySelector('textarea[name="respuesta_3"]').required = true;
    } else {
        campoQueHiciste.style.display = 'none';
        document.querySelector('textarea[name="respuesta_3"]').required = false;
    }
}

radioSi.addEventListener('change', toggleCampoQueHiciste);
radioNo.addEventListener('change', toggleCampoQueHiciste);
</script>
{% endblock %}
