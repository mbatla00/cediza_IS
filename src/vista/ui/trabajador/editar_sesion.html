{% extends "base.html" %}

{% block title %}Editar Sesión - CEDIZA{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-warning text-dark py-3">
                <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Sesión</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Paciente</label>
                        <input type="text" class="form-control" value="{{ sesion.paciente }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Fecha *</label>
                        <input type="date" class="form-control" name="fecha" value="{{ sesion.fecha.strftime('%Y-%m-%d') if sesion.fecha else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Hora *</label>
                        <input type="time" class="form-control" name="hora" value="{{ sesion.hora.strftime('%H:%M') if sesion.hora else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Comentarios</label>
                        <textarea class="form-control" name="comentarios" rows="3">{{ sesion.comentarios or '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between border-top pt-3">
                        <a href="{{ url_for('trabajador.especialista_dashboard') }}" class="btn btn-light">Cancelar</a>
                        <button type="submit" class="btn btn-warning px-4">
                            <i class="bi bi-save"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
