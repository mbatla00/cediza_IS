{% extends "base.html" %}

{% block title %}Mi Perfil - Trabajador{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-info text-white py-3">
                <h4 class="mb-0"><i class="bi bi-person-circle"></i> Mi Perfil - Trabajador</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nombre Completo *</label>
                            <input type="text" class="form-control" name="nombre" value="{{ usuario.nombre }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nombre de Usuario</label>
                            <input type="text" class="form-control" value="{{ usuario.nombreUsuario }}" disabled readonly>
                            <div class="form-text">El nombre de usuario no se puede modificar.</div>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">DNI</label>
                            <input type="text" class="form-control" name="dni" value="{{ usuario.dni or '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Fecha de Nacimiento</label>
                            <input type="date" class="form-control" name="fecha_nacimiento" value="{{ usuario.fechaNacimiento or '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Teléfono</label>
                            <input type="tel" class="form-control" name="telefono" value="{{ usuario.telefono or '' }}" placeholder="666777888">
                            <div class="form-text">9 dígitos, sin espacios.</div>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" name="email" value="{{ usuario.email or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nueva Contraseña</label>
                            <input type="password" class="form-control" name="password" placeholder="Dejar en blanco para no cambiar">
                        </div>
                    </div>

                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> Como trabajador, puedes actualizar tus datos personales y contraseña.
                    </div>

                    <div class="d-flex justify-content-between border-top pt-3">
                        <a href="{{ url_for('auth.dashboard_redirect') }}" class="btn btn-light">Volver al Dashboard</a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-save"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
